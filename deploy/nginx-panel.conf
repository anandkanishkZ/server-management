# Vhost for the panel itself. Put this on its own subdomain, ideally with an
# IP allowlist (allow x.x.x.x/32; deny all;) in front of the location blocks.
server {
    listen 443 ssl http2;
    server_name panel.example.com;

    ssl_certificate     /etc/letsencrypt/live/panel.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.example.com/privkey.pem;

    root /opt/panel/apps/web/dist;
    index index.html;

    # Static SPA build - no Node process needed to serve it.
    location / {
        try_files $uri /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for live system stats
    location /api/system/stream {
        proxy_pass http://127.0.0.1:4000/system/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name panel.example.com;
    return 301 https://$host$request_uri;
}
